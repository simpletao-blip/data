   <g id="text_1">
    <text style="font-weight: 700; font-size: 8px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #4477aa" x="23.431104" y="60.862056" transform="rotate(-0 23.431104 60.862056)">1  Evidence</text>
   </g>
   <g id="text_2">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(23.431104 74.185156)">IDT, LBV and species</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(23.431104 81.628367)">Study-level metadata</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(23.431104 89.044765)">8–12 mechanisms</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 8px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #4477aa" x="158.020704" y="60.862056" transform="rotate(-0 158.020704 60.862056)">2  External validation</text>
   </g>
   <g id="text_4">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(158.020704 74.185156)">Leave one study out</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(158.020704 81.601555)">Match criterion/reactor</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(158.020704 88.941781)">Error, bias and failures</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 8px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #ee9944" x="292.610304" y="60.821431" transform="rotate(-0 292.610304 60.821431)">3  Ensemble gate</text>
   </g>
   <g id="text_6">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(292.610304 74.185156)">Non-negative weights</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(292.610304 81.704539)">Separate observables</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(292.610304 89.044765)">Beat both baselines?</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 8px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #228833" x="292.610304" y="126.697056" transform="rotate(-0 292.610304 126.697056)">4  Cross-test screen</text>
   </g>
   <g id="text_8">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; fill: #263238" transform="translate(292.610304 140.099375)">Supported IDT range</text>
